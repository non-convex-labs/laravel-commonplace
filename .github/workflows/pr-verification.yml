name: PR verification

# The proof-of-reading gate for pull requests.
#
# Runs in base-repo context (write-capable) via `workflow_run`, listening
# for completion of pr-verification-trigger.yml. The trigger runs in
# fork-controlled context with no write access; this workflow runs after
# it with full base-repo permissions.
#
# All the work — looking up the PR(s) from the trigger's head SHA,
# fetching CONTRIBUTING.md from the default branch, computing the
# verdict, applying labels and comments — happens here in one place.
# No artifact handoff: the only data the trigger conveys to this
# workflow is its head SHA (via the workflow_run payload), from which
# everything else is fetched via the API.

on:
  workflow_run:
    workflows: ["PR verification (trigger)"]
    types: [completed]

permissions:
  issues: write
  pull-requests: write
  contents: read

concurrency:
  group: pr-verification-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  verify:
    name: Apply verification gate
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Verify and act
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const LABEL = 'needs-verification';
            const EXEMPT_ASSOC = new Set(['OWNER', 'MEMBER', 'COLLABORATOR']);

            const COMMENTS = {
              missing: [
                "Welcome, and thanks for opening this.",
                "",
                "We run a small \"proof of reading\" gate on contributions, in the spirit of 1990s manual-lookup DRM (\"turn to page 47 and type the second word\"). The PR template has a **Reading verification** field; the answer is the last word of [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md), near the bottom of the file.",
                "",
                "Edit the PR description, fill in the field, and this label will drop on its own.",
              ].join('\n'),

              mismatch: [
                "Thanks for filling in the **Reading verification** field — that answer doesn't quite match what the gate is looking for, though.",
                "",
                "It's the last word of [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md), near the bottom of the file. Capitalization and punctuation don't matter; the last alphabetic word does.",
                "",
                "Edit the PR description with the right answer and this label will drop on its own.",
              ].join('\n'),

              cleared: "Verification cleared. Thanks for reading the contributing guide — it makes the next reviewer's job easier.",
            };

            // ---- Helpers -----------------------------------------------
            function normalize(token) {
              return (token || '')
                .replace(/^[^A-Za-z0-9]+/, '')
                .replace(/[^A-Za-z0-9]+$/, '')
                .toLowerCase();
            }

            function lastWord(text) {
              const trimmed = text.replace(/\s+$/, '');
              const tokens = trimmed.split(/\s+/);
              return normalize(tokens[tokens.length - 1]);
            }

            function extractAnswer(body) {
              // Strip fenced code blocks first so a heading-shaped line
              // inside a contributor's paste doesn't get mistaken for
              // the real heading.
              let stripped = body.replace(/```[\s\S]*?```/g, '');
              stripped = stripped.replace(/~~~[\s\S]*?~~~/g, '');
              // Strip well-formed HTML comments so the template's
              // explanatory <!-- ... --> block can't leak prose into
              // the answer slot.
              stripped = stripped.replace(/<!--[\s\S]*?-->/g, '');

              const lines = stripped.split(/\r?\n/);
              // Scan from the end — the Reading verification heading is
              // always near the bottom in our templates, and scanning
              // backwards means trailing real content wins over any
              // earlier heading-shaped paste.
              let headingIndex = -1;
              for (let i = lines.length - 1; i >= 0; i--) {
                if (/^#{2,6}\s+Reading verification\s*$/i.test(lines[i])) {
                  headingIndex = i;
                  break;
                }
              }
              if (headingIndex === -1) return null;

              const collected = [];
              for (let i = headingIndex + 1; i < lines.length && !/^#{1,6}\s/.test(lines[i]); i++) {
                collected.push(lines[i].trim());
              }
              const line = collected.find(s =>
                s && s !== '_No response_' && s !== 'your-answer-here'
              );
              if (!line) return null;
              const normalized = normalize(line);
              return normalized || null;
            }

            // ---- Resolve PR candidates ---------------------------------
            // workflow_run carries head_sha + head_repository + head_branch
            // but not the PR number (for fork PRs the pull_requests array
            // is empty). We resolve via the commit-association API and
            // filter to PRs whose head exactly matches the trigger's head.
            // Multiple PRs can legitimately share the same (repo, branch,
            // SHA) tuple — e.g., one branch open against two bases — so
            // we process all candidates rather than bailing.

            const headSha = context.payload.workflow_run.head_sha;
            const triggerRepoFullName =
              (context.payload.workflow_run.head_repository &&
                context.payload.workflow_run.head_repository.full_name) || null;
            const triggerHeadBranch = context.payload.workflow_run.head_branch || null;

            let candidates;
            const sameRepoPrs = context.payload.workflow_run.pull_requests || [];
            const sameRepoOpen = sameRepoPrs.filter(p => p.head && p.head.sha === headSha);
            if (sameRepoOpen.length > 0) {
              candidates = sameRepoOpen;
            } else {
              const resp = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: headSha,
              });
              candidates = resp.data.filter(p =>
                p.state === 'open' &&
                p.head && p.head.sha === headSha &&
                (!triggerRepoFullName || (p.head.repo && p.head.repo.full_name === triggerRepoFullName)) &&
                (!triggerHeadBranch || p.head.ref === triggerHeadBranch)
              );
            }

            if (candidates.length === 0) {
              core.notice(`No open PR found for SHA ${headSha}; nothing to do`);
              return;
            }
            core.info(`Processing ${candidates.length} PR(s): ${candidates.map(c => c.number).join(', ')}`);

            // ---- Fetch CONTRIBUTING.md from default branch -------------
            // Always read from the default branch, never the PR head.
            // Reading from head would let a malicious contributor edit
            // CONTRIBUTING.md in their fork and pass the gate with the
            // new last word — a self-modify bypass. Reading from main
            // closes that. The cost is that doc-PRs proposing a
            // rotation must submit with the OLD answer (the one
            // currently on main); the new answer takes effect after
            // merge. Maintainer rotations are exempt anyway.
            const defaultBranch =
              (context.payload.repository && context.payload.repository.default_branch) || 'main';

            let contributing;
            try {
              const resp = await github.rest.repos.getContent({
                owner,
                repo,
                path: 'CONTRIBUTING.md',
                ref: defaultBranch,
              });
              if (Array.isArray(resp.data) || resp.data.type !== 'file') {
                throw new Error('CONTRIBUTING.md is not a file on the default branch');
              }
              contributing = Buffer.from(resp.data.content, resp.data.encoding).toString('utf-8');
            } catch (e) {
              core.warning(`Could not fetch CONTRIBUTING.md from ${defaultBranch}: ${e.message}`);
              return;
            }

            const expected = lastWord(contributing);
            if (!expected) {
              core.warning('Could not derive expected last-word from CONTRIBUTING.md; skipping');
              return;
            }

            // ---- Process each candidate --------------------------------
            async function processPullRequest(prNumber) {
              let pr;
              try {
                const resp = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
                pr = resp.data;
              } catch (e) {
                core.warning(`Could not fetch PR #${prNumber}: ${e.message}`);
                return;
              }

              if (pr.head.sha !== headSha) {
                core.notice(`PR #${prNumber} head SHA changed since trigger (was ${headSha.slice(0, 8)}, now ${pr.head.sha.slice(0, 8)}); skipping — a new trigger will re-fire`);
                return;
              }

              const authorAssoc = pr.author_association || '';
              const userType = (pr.user && pr.user.type) || '';
              if (EXEMPT_ASSOC.has(authorAssoc) || userType === 'Bot') {
                core.info(`PR #${prNumber} exempt (assoc=${authorAssoc}, userType=${userType})`);
                return;
              }

              const actual = extractAnswer(pr.body || '');
              let verdict, action;
              if (!actual) {
                verdict = 'missing';
                action = 'label_apply';
              } else if (actual !== expected) {
                verdict = 'mismatch';
                action = 'label_apply';
              } else {
                verdict = 'match';
                action = 'label_remove';
              }
              core.info(`PR #${prNumber}: ${verdict} / ${action}`);

              const labels = (pr.labels || []).map(l => l.name);
              const hasLabel = labels.includes(LABEL);

              if (action === 'label_apply') {
                if (hasLabel) return;
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: prNumber,
                  labels: [LABEL],
                });
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: prNumber,
                  body: verdict === 'missing' ? COMMENTS.missing : COMMENTS.mismatch,
                });
                return;
              }

              if (action === 'label_remove') {
                let didSomething = false;
                if (hasLabel) {
                  try {
                    await github.rest.issues.removeLabel({
                      owner,
                      repo,
                      issue_number: prNumber,
                      name: LABEL,
                    });
                    didSomething = true;
                  } catch (e) {
                    if (e.status !== 404) throw e;
                  }
                }
                if (pr.state === 'closed' && !pr.merged && hasLabel) {
                  await github.rest.pulls.update({
                    owner,
                    repo,
                    pull_number: prNumber,
                    state: 'open',
                  });
                  didSomething = true;
                }
                if (didSomething) {
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: prNumber,
                    body: COMMENTS.cleared,
                  });
                }
              }
            }

            for (const candidate of candidates) {
              try {
                await processPullRequest(candidate.number);
              } catch (e) {
                core.warning(`Failed to process PR #${candidate.number}: ${e.message}`);
              }
            }
